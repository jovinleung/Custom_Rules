;游戏平台（国际游戏服务）
ruleset=🎮 游戏平台,[]GEOSITE,category-games-!cn
ruleset=🎮 游戏平台,[]GEOSITE,steam

;云服务
ruleset=💾 OneDrive,[]GEOSITE,onedrive
ruleset=☁️ AWS,[]GEOSITE,aws
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
